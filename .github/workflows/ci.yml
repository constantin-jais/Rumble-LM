name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features

  supply-chain:
    # Evolution Sec2: OSS-only licensing (ADR-0001) + vulnerability scan, gated.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  integration:
    # Real-infra gated tests against live Postgres (pgvector) + Redis service
    # containers — the multi-instance, store-divergence, and corpus tests that the
    # default run skips — AND the line-coverage gate (>= 80%, via tarpaulin.toml)
    # which only reaches threshold when these gated paths run. The AI-gated tests
    # (live_provider, live_rag) self-skip without an AI endpoint; they stay a
    # manual/local proof.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: presto
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:presto@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Integration + coverage gate (real Postgres + Redis, >= 80%)
        # cargo-llvm-cov instruments at COMPILE time (no ptrace), so the async WS
        # tests run normally — unlike tarpaulin's Linux ptrace engine which
        # destabilizes them. Runs the gated tests AND enforces >= 80% line
        # coverage; main.rs (binary composition root) excluded. The load test is
        # skipped here: it is a LATENCY test (its perf assertions are invalid
        # under coverage instrumentation, which inflates timings ~4x) and its
        # coverage is redundant with the WS integration tests — the §3 SLOs are
        # proven locally with `cargo test --release --test load -- --ignored`.
        run: >-
          cargo llvm-cov --workspace --ignore-filename-regex 'main\.rs'
          --fail-under-lines 80 -- --include-ignored --skip sustains_200_participants
